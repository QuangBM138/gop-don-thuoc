<!DOCTYPE html>
<html lang="vi">

    <head>
        <meta charset="UTF-8">
        <title>Gộp 2 liên A5 - Hỗ trợ nhiều trang - Giữ chữ ký</title>
        <link rel="icon" href="download.png">
        <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script>
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        </script>
        <style>
            body {
                font-family: 'Segoe UI', sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background-color: #eceff1;
                margin: 0;
            }

            .card {
                background: white;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                text-align: center;
                width: 450px;
            }

            h2 {
                color: #2c3e50;
                margin-bottom: 10px;
            }

            p {
                color: #7f8c8d;
                margin-bottom: 25px;
            }

            input[type="file"] {
                display: block;
                width: 100%;
                margin-bottom: 20px;
                border: 1px solid #ddd;
                padding: 10px;
                border-radius: 5px;
            }

            button {
                background-color: #27ae60;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                width: 100%;
                font-size: 16px;
                transition: 0.3s;
            }

            button:hover {
                background-color: #219150;
            }

            button:disabled {
                background-color: #95a5a6;
                cursor: not-allowed;
            }

            #status {
                margin-top: 20px;
                font-weight: 500;
                white-space: pre-line;
            }

            .success {
                color: #28a745;
            }

            .error {
                color: #dc3545;
            }
        </style>
    </head>

    <body>

        <div class="card">
            <h2>Công cụ Gộp 2 Liên</h2>
            <p>Hỗ trợ file nhiều trang (Trang 1 -> 2 liên P1, Trang 2 -> 2 liên P2...)</p>

            <input type="file" id="pdfFile" accept="application/pdf">
            <button id="btnProcess" onclick="processAndMerge()">Xử lý và In ngay</button>

            <div id="status"></div>
        </div>

        <script>
            async function processAndMerge() {
                const fileInput = document.getElementById('pdfFile');
                const status = document.getElementById('status');
                const btn = document.getElementById('btnProcess');

                if (!fileInput.files[0]) {
                    status.innerHTML = '<span class="error">Vui lòng chọn file PDF!</span>';
                    return;
                }

                status.innerHTML = 'Đang khởi tạo...';
                btn.disabled = true;

                try {
                    const file = fileInput.files[0];
                    const arrayBuffer = await file.arrayBuffer();

                    // 1. Dùng PDF.js để đọc file
                    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                    const pdfDocument = await loadingTask.promise;
                    const totalPages = pdfDocument.numPages;

                    // 2. Tạo file PDF mới bằng PDF-lib
                    const { PDFDocument } = PDFLib;
                    const newPdfDoc = await PDFDocument.create();

                    const halfWidth = 420.94;
                    const height = 595.28;

                    // Vòng lặp xử lý từng trang một
                    for (let i = 1; i <= totalPages; i++) {
                        status.innerHTML = `Đang xử lý trang ${i}/${totalPages}...`;

                        const page = await pdfDocument.getPage(i);
                        const scale = 4.0; // Độ phân giải cao để in nét
                        const viewport = page.getViewport({ scale: scale });

                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        // Vẽ trang PDF lên canvas
                        await page.render({ canvasContext: context, viewport: viewport }).promise;

                        // Chuyển canvas thành ảnh
                        const imgDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                        const imgBytes = await fetch(imgDataUrl).then(res => res.arrayBuffer());
                        const embeddedImage = await newPdfDoc.embedJpg(imgBytes);

                        // Thêm một trang mới cho mỗi trang gốc
                        const newPage = newPdfDoc.addPage([841.89, 595.28]);

                        // Vẽ 2 lần trên trang mới
                        newPage.drawImage(embeddedImage, {
                            x: 0,
                            y: 0,
                            width: halfWidth,
                            height: height
                        });

                        newPage.drawImage(embeddedImage, {
                            x: halfWidth,
                            y: 0,
                            width: halfWidth,
                            height: height
                        });
                    }

                    status.innerHTML = 'Đang chuẩn bị lệnh in...';
                    const finalPdfBytes = await newPdfDoc.save();

                    const blob = new Blob([finalPdfBytes], { type: "application/pdf" });
                    const blobUrl = URL.createObjectURL(blob);

                    // Xóa iframe cũ nếu có trước đó
                    const oldIframe = document.getElementById('pdfPrintIframe');
                    if (oldIframe) {
                        oldIframe.remove();
                    }

                    // Tạo một iframe ẩn để chứa PDF và gọi lệnh in
                    const iframe = document.createElement('iframe');
                    iframe.id = 'pdfPrintIframe';
                    iframe.style.position = 'fixed';
                    iframe.style.right = '0';
                    iframe.style.bottom = '0';
                    iframe.style.width = '0';
                    iframe.style.height = '0';
                    iframe.style.border = 'none';
                    iframe.src = blobUrl;

                    document.body.appendChild(iframe);

                    // Đợi iframe tải xong nội dung PDF rồi kích hoạt lệnh in
                    iframe.onload = function() {
                        setTimeout(function() {
                            iframe.contentWindow.focus();
                            iframe.contentWindow.print();
                            status.innerHTML = `<span class="success">Đã gửi lệnh in thành công cho ${totalPages} trang!</span>`;
                        }, 200);
                    };

                } catch (err) {
                    console.error(err);
                    status.innerHTML = `<span class="error">Lỗi: ${err.message}</span>`;
                } finally {
                    btn.disabled = false;
                }
            }
        </script>

    </body>

</html>
